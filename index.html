<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yuyu辞書 - Handwriting & Memory Ed.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
        body { background: #fcfbf9; font-family: 'PingFang SC', 'Noto Serif JP', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #f0f0f0; }
        .history-card { cursor: pointer; transition: all 0.2s ease; }
        .history-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .pitch-badge { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 800; }
        
        ruby { ruby-align: center; }
        rt { 
            color: #6366f1; 
            font-size: 0.65em; 
            font-weight: 600; 
            font-family: sans-serif;
            transform: translateY(-2px);
        }

        #drawPad {
            touch-action: none;
            cursor: crosshair;
        }
    </style>
</head>
<body class="min-h-screen p-6 relative">

    <div class="max-w-6xl mx-auto space-y-8">
        <div class="text-center relative">
            <h1 class="text-4xl font-bold text-gray-800 tracking-tight">yuyu辞書</h1>
            <p class="mt-2 text-gray-500 italic">Vision OCR, Handwriting & Memory Hints.</p>
            <button onclick="setApiKey()" class="absolute right-0 top-0 md:top-2 mt-2 mr-2 text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-600 py-2 px-4 rounded-full transition-colors shadow-sm font-bold flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                密钥管理
            </button>
        </div>

        <div class="max-w-2xl mx-auto glass-card p-2 rounded-3xl shadow-xl transition-all border-2 border-transparent focus-within:border-indigo-100 relative z-50">
            
            <div id="drawContainer" class="hidden absolute top-full left-0 w-full mt-4 bg-white p-4 rounded-3xl shadow-2xl border border-gray-100 z-50">
                <div class="flex justify-between items-center mb-2 px-2">
                    <span class="text-sm font-bold text-gray-500 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        请在下方写下不认识的字
                    </span>
                    <button onclick="toggleDrawPad()" class="text-gray-400 hover:text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                <div class="border-2 border-dashed border-gray-200 rounded-xl overflow-hidden bg-gray-50 mb-3 relative">
                    <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-20">
                        <div class="w-full h-px bg-gray-400"></div>
                        <div class="h-full w-px bg-gray-400 absolute"></div>
                    </div>
                    <canvas id="drawPad" width="600" height="250" class="w-full block"></canvas>
                </div>
                <div class="flex gap-3">
                    <button onclick="clearDrawPad()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-medium transition-colors">清空重写</button>
                    <button onclick="submitDrawing()" class="flex-[2] py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium shadow-md transition-colors flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        识别并解析
                    </button>
                </div>
            </div>

            <div id="imagePreviewContainer" class="hidden relative p-4 bg-gray-50 rounded-2xl mb-2 mx-2">
                <p class="text-xs text-indigo-500 font-bold mb-2">📸 已捕获图片/手写 (AI 将识别此图)：</p>
                <img id="imagePreview" class="max-h-32 rounded-lg shadow-sm border border-gray-200 bg-white" src="" alt="预览图">
                <button onclick="clearImage()" class="absolute top-4 right-4 bg-white text-gray-400 hover:text-red-500 rounded-full p-1 shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex items-center gap-2 px-3 py-2">
                <button onclick="toggleDrawPad()" class="p-3 text-indigo-500 hover:bg-indigo-50 rounded-2xl cursor-pointer transition-colors" title="手写输入">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </button>
                
                <input type="text" id="userInput" placeholder="输入中日文、粘贴截图，或点击左侧手写..." 
                       class="flex-1 bg-transparent py-3 text-lg outline-none border-none placeholder-gray-400">
                
                <button onclick="fetchJapanese()" id="btnText" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl hover:bg-indigo-700 transition-all active:scale-95 font-medium shadow-lg shadow-indigo-200 shrink-0">
                    智能解析
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start mt-8 relative z-10">
            
            <div id="resultBox" class="hidden lg:col-span-2 glass-card p-10 rounded-3xl shadow-2xl space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
                
                <div class="flex justify-between items-start">
                    <div class="flex-1 pr-6">
                        <h2 id="jpWord" class="text-4xl md:text-5xl font-bold text-gray-900 mb-3 leading-tight"></h2>
                        <div class="flex items-center flex-wrap gap-3">
                            <p id="jpReading" class="text-xl text-gray-500 font-medium"></p>
                            <span id="jpPitch" class="hidden pitch-badge bg-amber-100 text-amber-700 px-3 py-1 rounded-lg text-sm shadow-sm border border-amber-200"></span>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 shrink-0">
                        <button onclick="openGoogleImages()" class="p-3 bg-emerald-50 rounded-full text-emerald-600 hover:bg-emerald-100 transition-colors shadow-sm" title="谷歌真实图片">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </button>
                        <button onclick="playAudio()" class="p-3 bg-indigo-50 rounded-full text-indigo-600 hover:bg-indigo-100 transition-colors shadow-sm" title="播放原声">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                        </button>
                    </div>
                </div>

                <div class="h-px bg-gray-100 w-full"></div>

                <div class="grid grid-cols-1 gap-6">
                    <div id="jpMeaningBox" class="space-y-2 bg-indigo-50/40 p-5 rounded-2xl border border-indigo-50">
                        <p class="text-xs font-black text-indigo-400 uppercase tracking-widest flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            日本語での意味 (汉字自带注音)
                        </p>
                        <p id="jpMeaning" class="text-gray-800 leading-relaxed text-lg font-medium tracking-wide"></p>
                    </div>
                    <div class="space-y-2 px-2">
                        <p class="text-xs font-black text-gray-400 uppercase tracking-widest">中文翻译</p>
                        <p id="cnMeaning" class="text-gray-700 leading-relaxed text-md"></p>
                    </div>
                </div>

                <div id="memoryBox" class="hidden space-y-2 bg-amber-50/60 p-5 rounded-2xl border border-amber-100">
                    <p class="text-xs font-black text-amber-500 uppercase tracking-widest flex items-center gap-2">
                        💡 記憶のためのヒント (語呂合わせ・語源)
                    </p>
                    <p id="jpMemory" class="text-gray-700 leading-relaxed text-base whitespace-pre-wrap"></p>
                </div>

                <div id="exampleBox" class="space-y-4 px-2">
                    <p class="text-xs font-black text-gray-400 uppercase tracking-widest">記憶のための例文</p>
                    <ul id="jpExamplesList" class="space-y-5 text-gray-800 border-l-4 border-indigo-200 pl-5 text-lg">
                    </ul>
                </div>

                <div id="grammarBox" class="hidden space-y-4 bg-gray-50 p-6 rounded-2xl border border-gray-100">
                    <p class="text-xs font-black text-gray-500 uppercase tracking-widest flex items-center gap-2">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
                        语法深度拆解 (带注音)
                    </p>
                    <div id="jpGrammar" class="text-gray-700 leading-relaxed text-base whitespace-pre-wrap space-y-2"></div>
                </div>
            </div>

            <div class="glass-card p-8 rounded-3xl shadow-xl relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-800">学習履歴</h3>
                    <button onclick="clearHistory()" class="text-sm text-red-500 hover:underline">清空</button>
                </div>
                <div id="historyList" class="space-y-3 h-[600px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        let currentImageBase64 = null; 

        // --- 画板核心逻辑 ---
        const canvas = document.getElementById('drawPad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.strokeStyle = "black";
        }
        initCanvas();

        function toggleDrawPad() {
            const pad = document.getElementById('drawContainer');
            pad.classList.toggle('hidden');
            if(!pad.classList.contains('hidden')) {
                canvas.width = canvas.parentElement.clientWidth;
                initCanvas();
            }
        }

        function clearDrawPad() {
            initCanvas();
        }

        function submitDrawing() {
            const dataURL = canvas.toDataURL('image/jpeg', 1.0);
            currentImageBase64 = dataURL.split(',')[1];
            
            document.getElementById('imagePreview').src = dataURL;
            document.getElementById('imagePreviewContainer').classList.remove('hidden');
            
            toggleDrawPad();
            document.getElementById('userInput').value = ''; 
            fetchJapanese();
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
        canvas.addEventListener('mouseout', () => { isDrawing = false; ctx.beginPath(); });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; draw(e.touches[0]); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); }, {passive: false});
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); isDrawing = false; ctx.beginPath(); }, {passive: false});

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            
            // 👇 这里是新增的回车键监听代码 👇
            document.getElementById('userInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); // 阻止默认的回车行为（比如换行）
                    fetchJapanese();    // 触发解析功能
                }
            });
            // 👆 新增代码结束 👆

            document.addEventListener('paste', function(e) {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.startsWith('image/')) {
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            currentImageBase64 = event.target.result.split(',')[1]; 
                            document.getElementById('imagePreview').src = event.target.result;
                            document.getElementById('imagePreviewContainer').classList.remove('hidden');
                        };
                        reader.readAsDataURL(blob);
                    }
                }
            });
        });

        function getApiKey() {
            let key = localStorage.getItem('yuyu_api_key');
            if (!key) {
                key = window.prompt("【yuyu辞書 - 安全初始化】\n\n检测到您是首次使用，请输入您的 Gemini API Key。\n\n🔒 隐私承诺：您的密钥将只保存在当前设备的本地缓存中，绝不会上传至任何第三方服务器。");
                if (key && key.trim() !== '') {
                    localStorage.setItem('yuyu_api_key', key.trim());
                } else {
                    return null;
                }
            }
            return key.trim();
        }

        function setApiKey() {
            let current = localStorage.getItem('yuyu_api_key') || '';
            let msg = current ? "【密钥管理】\n已检测到本地保存的 Key。\n您可以粘贴新的 Key 来覆盖它，或者清空输入框并点击确定来删除当前 Key。" : "【密钥管理】\n请输入新的 Gemini API Key：";
            let newKey = window.prompt(msg, current);
            
            if (newKey !== null) {
                if (newKey.trim() === '') {
                    localStorage.removeItem('yuyu_api_key');
                    alert("🗑️ API Key 已从本地安全清除！");
                } else {
                    localStorage.setItem('yuyu_api_key', newKey.trim());
                    alert("✅ API Key 已更新并安全锁入本地缓存！");
                }
            }
        }

        function clearImage() {
            currentImageBase64 = null;
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('imagePreview').src = '';
        }

        async function fetchJapanese() {
            const input = document.getElementById('userInput').value.trim();
            if (!input && !currentImageBase64) return;
            
            const apiKey = getApiKey();
            if (!apiKey) {
                alert("⚠️ 需要配置 API Key 才能呼叫 AI 引擎哦！请点击右上角【密钥管理】设置。");
                return;
            }

            // 必要に応じて 1.5-flash または 2.5-flash に切り替えてください
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            toggleLoading(true);

            let promptText = `あなたはプロの日本語教師です。`;
            if (currentImageBase64) {
                promptText += `ユーザーが画像をアップロードしました。画像内の主要な日本語を正確に抽出し認識してください（ユーザーが入力枠に"${input}"と補足している場合はそれも考慮してください。手書きの漢字の場合はその文字を特定してください）。`;
            } else {
                promptText += `ユーザーの入力「${input}」を分析してください。`;
            }

            promptText += `
            分析ルール：
            1. 【単語/漢字】の場合：ふりがな、アクセント、日本語での意味、中国語訳、3つの例文（中国語訳付き）、さらに「語源や音の響き、ダジャレを用いた記憶のヒント（語呂合わせ）」を提供してください。
            2. 【フレーズ/長文】の場合：全体のふりがな、全体の中国語訳、詳細な文法解説を提供してください。
            
            🔥【強制ルビ（ふりがな）ルール】🔥：
            初学者が読みやすいように、返却する 'jp_meaning', 'examples', 'grammar', 'memory_hint' の日本語部分に含まれる**すべての漢字**に、HTMLの <ruby> タグを使ってふりがなを振ってください！
            例：<ruby>直列<rt>ちょくれつ</rt></ruby>。
            注意：ひらがな・カタカナのみの部分にはrubyタグを付けず、漢字にのみ付けてください。中国語訳は全角括弧（）で囲んでください。

            以下の厳密なJSON形式で返してください（Markdown記法は含めないでください）：
            {
                "is_sentence": true または false,
                "text": "抽出した日本語原文または漢字",
                "reading": "ふりがな、または全体の読み",
                "pitch": "アクセント(例: ①型。長文は空文字)",
                "jp_meaning": "rubyタグ付きの日本語での意味(単語のみ)",
                "cn_meaning": "中国語訳",
                "memory_hint": "rubyタグ付きの記憶のヒントや語呂合わせ(単語のみ。長文は空文字)",
                "examples": [
                    "rubyタグ付きの例文日文 （中国語訳）"
                ],
                "grammar": "rubyタグ付きの文法解説(長文のみ)"
            }`;

            const parts = [{ text: promptText }];
            if (currentImageBase64) {
                parts.push({
                    inlineData: { mimeType: "image/jpeg", data: currentImageBase64 }
                });
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }] })
                });

                const data = await response.json();
                
                if (data.error) {
                    if (data.error.code === 400 && data.error.message.includes("API key not valid")) {
                        throw new Error("API Keyが無効です。【密钥管理】から再設定してください。");
                    }
                    throw new Error(data.error.message);
                }

                let rawText = data.candidates[0].content.parts[0].text;
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("AIの返答形式に異常があります");
                
                const result = JSON.parse(jsonMatch[0]);
                renderResult(result, true); 
                
                if(currentImageBase64) clearImage(); 
                document.getElementById('userInput').value = ''; 
                
            } catch (error) {
                console.error(error);
                alert("エラーが発生しました...\nヒント: " + error.message);
            } finally {
                toggleLoading(false);
            }
        }

        function renderResult(result, shouldSave = false) {
            document.getElementById('jpWord').innerText = result.text || "";
            document.getElementById('jpReading').innerText = result.reading || "";
            document.getElementById('cnMeaning').innerText = result.cn_meaning || "";
            
            const jpMeaningBox = document.getElementById('jpMeaningBox');
            if (result.jp_meaning) {
                document.getElementById('jpMeaning').innerHTML = result.jp_meaning; 
                jpMeaningBox.classList.remove('hidden');
            } else {
                jpMeaningBox.classList.add('hidden');
            }

            // --- 記憶のヒント（語呂合わせ）の描画 ---
            const memoryBox = document.getElementById('memoryBox');
            if (result.memory_hint && !result.is_sentence) {
                // 改行を反映させる
                document.getElementById('jpMemory').innerHTML = result.memory_hint.replace(/\n/g, '<br>'); 
                memoryBox.classList.remove('hidden');
            } else {
                memoryBox.classList.add('hidden');
            }
            
            const pitchEl = document.getElementById('jpPitch');
            if (result.pitch) {
                pitchEl.innerText = result.pitch;
                pitchEl.classList.remove('hidden');
            } else {
                pitchEl.classList.add('hidden');
            }

            const exampleBox = document.getElementById('exampleBox');
            const grammarBox = document.getElementById('grammarBox');
            
            if (result.is_sentence && result.grammar) {
                exampleBox.classList.add('hidden');
                grammarBox.classList.remove('hidden');
                document.getElementById('jpGrammar').innerHTML = result.grammar; 
            } else {
                grammarBox.classList.add('hidden');
                exampleBox.classList.remove('hidden');
                
                const listEl = document.getElementById('jpExamplesList');
                listEl.innerHTML = '';
                if (result.examples && result.examples.length > 0) {
                    result.examples.forEach(ex => {
                        const li = document.createElement('li');
                        li.className = "pb-4 border-b border-dashed border-gray-100 last:border-0 leading-relaxed";
                        let formattedEx = ex.replace(/（(.*?)）|\((.*?)\)/g, '<br><span class="text-sm text-gray-400 mt-1 inline-block">($1$2)</span>');
                        li.innerHTML = formattedEx;
                        listEl.appendChild(li);
                    });
                }
            }
            
            document.getElementById('resultBox').classList.remove('hidden');

            if (shouldSave) {
                saveToHistory(result); 
            }
        }

        function openGoogleImages() {
            const word = document.getElementById('jpWord').innerText;
            if (!word) return;
            window.open(`https://www.google.co.jp/search?tbm=isch&q=${encodeURIComponent(word)}`, '_blank');
        }

        function saveToHistory(entry) {
            let history = JSON.parse(localStorage.getItem('jp_vibe_history') || '[]');
            history = history.filter(item => item.text !== entry.text);
            history.unshift(entry); 
            localStorage.setItem('jp_vibe_history', JSON.stringify(history.slice(0, 30)));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('jp_vibe_history') || '[]');
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = history.length === 0 ? `<p class="text-center text-gray-400 py-10">暂无学习记录。</p>` : '';

            history.forEach(item => {
                const card = document.createElement('div');
                card.className = "history-card glass-card p-4 rounded-xl flex flex-col shadow-sm";
                card.onclick = () => {
                    renderResult(item, false); 
                    window.scrollTo({ top: 0, behavior: 'smooth' }); 
                };
                card.innerHTML = `
                    <div class="truncate pr-4">
                        <div class="text-lg font-bold text-gray-900 truncate">${item.text}</div>
                        <div class="text-sm text-indigo-500 truncate">${item.reading}</div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function clearHistory() {
            if(confirm("确定清空吗？")) {
                localStorage.removeItem('jp_vibe_history');
                loadHistory();
                document.getElementById('resultBox').classList.add('hidden');
            }
        }

        function toggleLoading(isLoading) {
            document.getElementById('btnText').innerText = isLoading ? "识别中..." : "智能解析";
        }

        function playAudio() {
            const word = document.getElementById('jpWord').innerText;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'ja-JP';
            utterance.rate = 0.8; 
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
